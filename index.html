<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cybersecurity Personality Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<h1 class="text-center mt-4">What Type of Cybersecurity Specialist Are You? 🔐</h1>

<!-- QUESTION 1 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block">
    <h4>What task sounds most interesting?</h4>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="3">Finding vulnerabilities</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="4">Analyzing attacks</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="2">Defending systems</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="1">Helping users</button>
  </div>
</div>

<!-- QUESTION 2 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block">
    <h4>How do you approach problems?</h4>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="4">Analyze deeply</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="3">Test systems</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="2">Build solutions</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="1">Explain simply</button>
  </div>
</div>

<!-- QUESTION 3 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block">
    <h4>Pick your strength:</h4>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="3">Curiosity</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="4">Critical thinking</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="2">Detail-oriented</button>
    <button class="btn btn-outline-primary my-2 answer-btn" data-points="1">Communication</button>
  </div>
</div>

<!-- RESULT BUTTON -->
<div class="container text-center">
  <button id="show-result" class="btn btn-success my-4">Show Results</button>
</div>

<!-- RESULT -->
<div class="container d-flex justify-content-center">
  <div id="result-container" class="card p-4 mb-4" style="display:none;">
    <h3>Your Result:</h3>
    <p id="result-text"></p>
  </div>
</div>

<script src="./js/script.js"></script>

</body>
</html>
